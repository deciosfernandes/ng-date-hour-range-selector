<!-- Trigger button -->
<button
  #trigger
  class="drs-picker__trigger"
  type="button"
  [attr.aria-expanded]="isOpen()"
  aria-haspopup="dialog"
  [attr.aria-label]="ariaLabel()"
  [disabled]="isDisabled() ? true : null"
  (click)="toggle()"
>
  @if (resolvedConfig().calendarIcon === 'left') {
    <svg
      class="drs-picker__icon"
      aria-hidden="true"
      focusable="false"
      viewBox="0 0 20 20"
      fill="currentColor"
      xmlns="http://www.w3.org/2000/svg"
    >
      <path
        fill-rule="evenodd"
        clip-rule="evenodd"
        d="M6 2a1 1 0 0 0-1 1v1H4a2 2 0 0 0-2 2v10a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V6a2 2 0 0 0-2-2h-1V3a1 1 0 1 0-2 0v1H7V3a1 1 0 0 0-1-1ZM4 8h12v8H4V8Z"
      />
    </svg>
  }
  <span class="drs-picker__display">
    {{ displayValue() || (locale.placeholder ?? 'Select date range') }}
  </span>
  @if (resolvedConfig().calendarIcon === 'right') {
    <svg
      class="drs-picker__icon"
      aria-hidden="true"
      focusable="false"
      viewBox="0 0 20 20"
      fill="currentColor"
      xmlns="http://www.w3.org/2000/svg"
    >
      <path
        fill-rule="evenodd"
        clip-rule="evenodd"
        d="M6 2a1 1 0 0 0-1 1v1H4a2 2 0 0 0-2 2v10a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V6a2 2 0 0 0-2-2h-1V3a1 1 0 1 0-2 0v1H7V3a1 1 0 0 0-1-1ZM4 8h12v8H4V8Z"
      />
    </svg>
  }
</button>

<!-- Overlay template (attached to body via CDK TemplatePortal) -->
<ng-template #overlayTpl>
  <drs-picker-panel
    [rangeStart]="rangeStart()"
    [rangeEnd]="rangeEnd()"
    [viewYear]="viewYear()"
    [viewMonth]="viewMonth()"
    [config]="panelConfig()"
    [predefinedRanges]="resolvedPredefinedRanges()"
    [locale]="locale"
    [activeRangeLabel]="activeRangeLabel()"
    [startHour]="startHour()"
    [startMinute]="startMinute()"
    [endHour]="endHour()"
    [endMinute]="endMinute()"
    (dateSelect)="onDateSelect($event)"
    (rangeSelect)="onRangeSelect($event)"
    (startTimeChange)="onStartTimeChange($event)"
    (endTimeChange)="onEndTimeChange($event)"
    (prevMonth)="prevMonth()"
    (nextMonth)="nextMonth()"
    (reset)="onReset()"
    (apply)="onApply()"
  />
</ng-template>
